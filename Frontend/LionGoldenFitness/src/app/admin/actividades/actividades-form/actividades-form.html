<div class="overlay d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0 w-100" style="max-width: 500px;">
    
    <div class="card-header bg-white py-3 border-bottom-0">
      <h3 class="h5 mb-0 fw-bold text-primary">
        {{ actividad ? 'Editar Actividad' : 'Nueva Actividad' }}
      </h3>
    </div>

    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="guardar()">

        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre</label>
          <input type="text" class="form-control" formControlName="nombre" 
                 [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
          
          @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
            <div class="invalid-feedback">
              El nombre es obligatorio.
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea class="form-control" formControlName="descripcion" rows="3"></textarea>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold">Cupos</label>
            <input type="number" class="form-control" formControlName="cupos">
          </div>

          <div class="col-6">
            <label class="form-label fw-semibold">Duración (min)</label>
            <input type="number" class="form-control" formControlName="duracion">
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="checkActiva" formControlName="activa">
            <label class="form-check-label fw-semibold" for="checkActiva">Activa</label>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end border-top pt-3">
          <button type="button" class="btn btn-light px-4" (click)="cancelar()">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary px-4 shadow-sm" [disabled]="form.invalid">
            <i class="bi bi-save me-2"></i>Guardar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
