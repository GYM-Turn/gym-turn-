<div class="overlay">
  <div class="card lion-card w-100" style="max-width: 500px;">

    <div class="card-header lion-header">
      <h3 class="lion-title">
        {{ actividad ? 'Editar Actividad' : 'Nueva Actividad' }}
      </h3>
    </div>

    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="guardar()">

        <div class="mb-3">
          <label class="form-label lion-label">Nombre</label>
          <input type="text"
                 class="form-control lion-input"
                 formControlName="nombre">

          @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
            <div class="lion-error-container">
              <small class="lion-error">El nombre es obligatorio.</small>
            </div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label lion-label">Descripción</label>
          <textarea class="form-control lion-input"
                    formControlName="descripcion"
                    rows="2"></textarea>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label lion-label">Cupos</label>
            <input type="number"
                   class="form-control lion-input"
                   formControlName="cupos">
          </div>

          <div class="col-6">
            <label class="form-label lion-label">Duración (min)</label>
            <input type="number"
                   class="form-control lion-input"
                   formControlName="duracion">
          </div>
        </div>

        <div class="mb-4">
          <label class="lion-switch">
            <input type="checkbox" formControlName="activa">
            <span class="slider"></span>
            <span class="lion-label ms-2">Activa</span>
          </label>
        </div>

        <div class="lion-actions">
          <button type="button"
                  class="btn-uno"
                  (click)="cancelar()">
            Cancelar
          </button>

          <button type="submit"
                  class="btn-uno"
                  [disabled]="form.invalid">
            Guardar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
