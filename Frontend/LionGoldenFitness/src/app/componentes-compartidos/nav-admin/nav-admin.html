@if (authService.isAdmin()) {

<nav class="navbar custom-nav">

  <div class="nav-header">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/inicio">
      <img src="/img/favicon.jpeg"
           alt="Logo LionGoldenFitness"
           class="logo-nav">
      <span>LionGoldenFitness</span>
    </a>

    <!-- Botón hamburguesa -->
    <button class="hamburger" (click)="toggleMenu()">
      ☰
    </button>
  </div>

  <!-- Menú desplegable -->
  <div class="nav-links" [class.active]="menuOpen">
    <a class="nav-link" routerLink="/admin/dashboard">Dashboard</a>
    <a class="nav-link" routerLink="/admin/usuarios">Usuarios</a>
    <a class="nav-link" routerLink="/admin/actividades">Actividades</a>
    <a class="nav-link" routerLink="/admin/turnos">Turnos</a>
    <a class="nav-link" routerLink="/admin/sucursales">Sucursales</a> 
    

    <button class="btn-uno" (click)="logout()">
      Cerrar sesión
    </button>
  </div>

</nav>
}
