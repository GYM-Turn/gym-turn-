@if (authService.isUsuario()) {
<nav class="navbar custom-nav">
  <div class="nav-header">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/inicio">
      <img src="/img/favicon.jpeg" alt="Logo LionGoldenFitness" class="logo-nav">
      <span>LionGoldenFitness</span>
    </a>

    @if (usuario$ | async; as usuario) {
      <div class="user-toggler" (click)="toggleMenu()">
        @if (usuario.foto) {
          <img [src]="resolverUrl(usuario.foto)" class="user-avatar" alt="Foto usuario" />
        } @else {
          <img src="/img/default-user.png" class="user-avatar" alt="Usuario" />
        }

        <span class="user-name">
          {{ usuario?.nombre }}
        </span>

        <span class="hamburger-icon">☰</span>
      </div>
    }
  </div>

  <div class="nav-links" [class.active]="menuOpen">
    <a class="nav-link" routerLink="/usuario/dashboard">Mi Dashboard</a>
    <a class="nav-link" routerLink="/usuario/editar-perfil">Editar perfil</a>
    <a class="nav-link" routerLink="/usuario/mis-turnos">Mis turnos</a>
    <a class="nav-link" routerLink="/usuario/reservas">Reservas</a>

    <button class="btn-uno" (click)="logout()">
      Cerrar sesión
    </button>
  </div>
</nav>
}
