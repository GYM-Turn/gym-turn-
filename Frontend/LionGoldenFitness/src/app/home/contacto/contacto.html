<app-nav></app-nav>
<div class="container-fluid d-flex justify-content-center align-items-center py-5">
  <div class="formulario-card shadow-lg p-4 p-md-5">

    <a href="index.html">
      <img src="\img\favicon.jpeg" alt="Logo de la Manada" class="logo-header">
    </a>
    
    <div class="header-form text-center mb-4">
      <h2 class="text-color-9">¡Únete a la Manada!</h2>
      <p>Déjanos tus datos y un asesor se pondrá en contacto contigo.</p>
    </div>

    <form class="row g-3">
      
      <div class="col-md-6">
        <label class="form-label text-white"><i class="fas fa-user me-2"></i>Nombre Completo</label>
        <input type="text" class="form-control-campos" placeholder="Ej. Fran Lion" required>
      </div>

      <div class="col-md-6">
        <label class="form-label text-white"><i class="fas fa-envelope me-2"></i>Correo Electrónico</label>
        <input type="email" class="form-control-campos" placeholder="fran@ejemplo.com" required>
      </div>

      <div class="col-md-6">
        <label class="form-label text-white"><i class="fas fa-phone me-2"></i>Teléfono</label>
        <input type="tel" class="form-control-campos" placeholder="+54 351 000 0000">
      </div>

      <div class="col-md-6">
        <label class="form-label text-white"><i class="fas fa-dumbbell me-2"></i>Interés principal</label>
        <select class="form-control-campos">
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="personal">Entrenamiento Personal</option>
          <option value="clases">Clases Grupales</option>
          <option value="nutricion">Nutrición Deportiva</option>
          <option value="otros">Otras consultas</option>
        </select>
      </div>

      <div class="col-12">
        <label class="form-label text-white"><i class="fas fa-comment-alt me-2"></i>Tu mensaje</label>
        <textarea class="form-control-campos" placeholder="Cuéntanos tus objetivos..." rows="4"></textarea>
      </div>

      <div class="col-12 mt-4">
        <button type="submit" class="btn-uno w-100 py-3 fw-bold">ENVIAR SOLICITUD</button>
      </div>

    </form>
  </div>
</div>
<app-footer></app-footer>
