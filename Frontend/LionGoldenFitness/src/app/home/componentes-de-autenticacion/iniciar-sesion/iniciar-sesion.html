<div class="login-container d-flex justify-content-center align-items-center">
  <div class="login-card shadow-lg">
    <h2 class="text-color-8">Iniciar Sesión</h2>
    <p>Ingresa tus credenciales para continuar</p>

    <form>
      <div class="input-group-custom">
        <label for="user">Usuario</label>
        <input type="text" id="user" class="form-control-custom" placeholder="Ej: diego123">
      </div>

      <div class="input-group-custom">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control-custom" placeholder="••••••••">
      </div>

      <div class="button-stack">
        <button type="submit" class="btn-custom btn-main">Ingresar</button>
        
        <button type="reset" class="btn-custom btn-reset" routerLink="/inicio">Volver a iniciar</button>
      </div>
    </form>

    <div class="card-footer-custom">
      <span>¿No tienes cuenta?</span>
      <button class="btn-reg" routerLink="/registro-nuevo-usuario">Registrarse</button>
    </div>
  </div>
</div>
