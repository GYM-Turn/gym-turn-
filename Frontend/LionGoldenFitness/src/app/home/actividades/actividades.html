<app-nav></app-nav>
<section class="actividades">
  <h2 class="titulo">Actividades</h2>

  <div class="actividades-grid">
    @for (actividad of actividades; track actividad.nombre) {
      <div class="actividad-card">

        <img [src]="actividad.imagen" [alt]="actividad.nombre">

        <div class="actividad-info">
          <h3>{{ actividad.nombre }}</h3>
          <p class="descripcion">{{ actividad.descripcion }}</p>
          <p class="horario">⏰ {{ actividad.horario }}</p>

          <button class="btn-uno">Ver actividad</button>
        </div>

      </div>
    }
  </div>
</section>
<app-footer></app-footer>
