<app-nav></app-nav>

<div class="usuario-container">

  <h2 class="titulo-usuario">
    Bienvenido {{ usuarioNombre }}
  </h2>

  <div class="resumen-card">
    <h3>Turnos Activos</h3>
    <p>{{ totalTurnos }}</p>
  </div>

  <div class="turnos-lista">
    <div class="turno-card" *ngFor="let turno of turnos">
      <h4>{{ turno.actividad }}</h4>
      <p>{{ turno.fecha }} - {{ turno.hora }}</p>
      <button (click)="cancelarTurno(turno.id)">
        Cancelar
      </button>
    </div>
  </div>

  <button class="btn-reservar" routerLink="/reservar-turno">
    Reservar nuevo turno
  </button>

</div>

<app-footer></app-footer>
