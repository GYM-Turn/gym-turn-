<div class="layout">
  <app-nav-usuario></app-nav-usuario>

  <div class="container mt-5 d-flex justify-content-center">
    <div class="formulario-card p-4 w-100">

      <h2 class="mb-4 text-center">Mis Turnos</h2>

      <div class="row justify-content-center g-4">

        @for (turno of misTurnos; track turno.id) {

          <div class="col-sm-10 col-md-6 col-lg-4 d-flex">

            <div class="shadow-sm w-100 h-100">

              <div class="card-turnos d-flex flex-column">

                <h5 class="card-title fw-bold text-center mb-3">
                  {{ turno.actividad.nombre }}
                </h5>

                <p>
                  <strong>Sucursal:</strong>
                  {{ turno.sucursal.nombre_sucursal }}
                </p>

                <p>
                  <strong>Fecha:</strong>
                  {{ turno.fecha_hora | date:'fullDate' }}
                </p>

                <div class="mt-auto d-grid">
                  <button
                    class="btn btn-danger"
                    (click)="cancelarTurno(turno)">
                    Cancelar turno
                  </button>
                </div>

              </div>

            </div>

          </div>

        }

      </div>

    </div>
  </div>

  <app-footer></app-footer>
</div>
